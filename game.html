<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="container">
        <!-- 欢迎界面 -->
        <div id="welcome-screen" class="screen">
            <h1>🐍 贪吃蛇游戏</h1>
            <p class="subtitle">经典益智游戏，挑战你的反应能力！</p>
            <div class="rules">
                <h3>游戏规则</h3>
                <ul>
                    <li>使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 方向键控制蛇的移动</li>
                    <li>吃到食物可以增加分数并让蛇变长</li>
                    <li>避免撞到墙壁或蛇自己的身体</li>
                    <li>随着分数增加，游戏难度会逐渐提升</li>
                </ul>
            </div>
            <button id="start-btn" class="btn btn-primary">开始游戏</button>
        </div>

        <!-- 游戏界面 -->
        <div id="game-screen" class="screen hidden">
            <div class="game-header">
                <div class="score-board">
                    <span class="label">分数:</span>
                    <span id="score" class="score">0</span>
                </div>
                <div class="high-score">
                    <span class="label">最高分:</span>
                    <span id="high-score" class="score">0</span>
                </div>
            </div>
            <div class="game-canvas-wrapper">
                <canvas id="game-canvas"></canvas>
            </div>
            <div class="controls">
                <button id="pause-btn" class="btn btn-secondary">暂停</button>
                <button id="restart-btn" class="btn btn-primary">重新开始</button>
            </div>
            <div class="mobile-controls" id="mobile-controls">
                <button class="mobile-btn" id="up-btn">↑</button>
                <div class="mobile-row">
                    <button class="mobile-btn" id="left-btn">←</button>
                    <button class="mobile-btn" id="down-btn">↓</button>
                    <button class="mobile-btn" id="right-btn">→</button>
                </div>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="game-over-screen" class="screen hidden">
            <h1>游戏结束!</h1>
            <div class="final-score">
                <p>最终得分</p>
                <p id="final-score-value" class="big-score">0</p>
            </div>
            <div id="new-record" class="new-record hidden">🎉 新纪录！</div>
            <button id="play-again-btn" class="btn btn-primary">再玩一次</button>
        </div>
    </div>

    <!-- 音效文件 -->
    <audio id="eat-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" type="audio/wav">
    </audio>
    <audio id="game-over-sound" preload="auto">
        <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" type="audio/wav">
    </audio>

    <script src="game.js"></script>
</body>
</html>
